name: Release

on:
  push:
    branches: [ master ]
    paths:
      - 'PostmanOpenAPIConverter/**'
      - 'installer/**'
  workflow_dispatch:

permissions:
  contents: write      # required to create releases and upload assets
  id-token: write      # required to mint the OIDC token for attestation
  attestations: write  # required to persist the attestations

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      # Compute the date-based version format used by the project: 1.0.yy.MMdd
      # If the tag for today already exists, append b, c, d... for subsequent releases.
      # The unsuffixed version is implicitly the first release of the day.
      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          try {
            $csprojPath = "PostmanOpenAPIConverter/PostmanOpenAPIConverter.csproj"
            Write-Host "Loading project file: $csprojPath"
            Write-Host "Current directory: $((Get-Location).Path)"

            [xml]$csproj = Get-Content $csprojPath -Raw

            $propertyGroups = @($csproj.Project.PropertyGroup)
            Write-Host "PropertyGroup count: $($propertyGroups.Count)"

            $baseVersion = $propertyGroups.BaseVersion | Where-Object { $_ } | Select-Object -First 1
            Write-Host "Resolved BaseVersion: '$baseVersion'"

            if (-not $baseVersion) {
              $projectXml = $csproj.OuterXml
              if ($projectXml.Length -gt 1000) {
                $projectXml = $projectXml.Substring(0, 1000)
              }

              Write-Host "Project XML preview: $projectXml"
              throw "BaseVersion was not found in PostmanOpenAPIConverter.csproj"
            }

            $base = "{0}.{1}" -f $baseVersion, (Get-Date -Format 'yy.MMdd')
            $version = $base

            function Test-ReleaseTagExists([string]$TagName) {
              $null = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$TagName" 2>$null
              return $LASTEXITCODE -eq 0
            }

            if (Test-ReleaseTagExists "v$base") {
              foreach ($suffix in 'b'..'z') {
                $candidate = "$base$suffix"
                if (-not (Test-ReleaseTagExists "v$candidate")) {
                  $version = $candidate
                  break
                }
              }
            }

            "value=$version" >> $env:GITHUB_OUTPUT
            "vi_value=$base" >> $env:GITHUB_OUTPUT
          }
          catch {
            Write-Host "Version computation failed."
            Write-Host "Exception type: $($_.Exception.GetType().FullName)"
            Write-Host "Exception message: $($_.Exception.Message)"
            Write-Host "Script stack trace: $($_.ScriptStackTrace)"
            throw
          }

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Install EnVar plugin
        shell: powershell
        run: |
          $zip  = "$env:TEMP\EnVar_plugin.zip"
          $dest = "$env:TEMP\EnVar_plugin"
          Invoke-WebRequest "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $dest -Force
          Copy-Item "$dest\Plugins\x86-unicode\EnVar.dll" "C:\Program Files (x86)\NSIS\Plugins\x86-unicode\EnVar.dll"

      - name: Publish
        run: >
          dotnet publish PostmanOpenAPIConverter/PostmanOpenAPIConverter.csproj
          -c Release
          -r win-x64
          --self-contained
          -p:DebugType=none
          -p:DebugSymbols=false
          -o PostmanOpenAPIConverter/bin/publish

      - name: Zip portable app
        shell: powershell
        run: Compress-Archive -Path "PostmanOpenAPIConverter/bin/publish/*" -DestinationPath "p2oa-portable.zip"

      - name: Attest portable ZIP
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'p2oa-portable.zip'

      - name: Build installer
        working-directory: installer
        run: makensis /DPRODUCT_VERSION=${{ steps.version.outputs.value }} /DVI_VERSION=${{ steps.version.outputs.vi_value }} p2oa.nsi

      - name: Zip installer
        shell: powershell
        run: Compress-Archive -Path "installer/p2oa-setup.exe" -DestinationPath "p2oa-installer.zip"

      - name: Attest installer ZIP
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'p2oa-installer.zip'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            p2oa-portable.zip
            installer/p2oa-setup.exe
            p2oa-installer.zip
